name: Producer CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/producer/**'    # 只有當 producer 程式碼變動時才觸發
      - 'deployments/**'     # 或是部署檔變動時
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # 確保有權限推回 commit
        
    # 1. 登入 Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. 建立並推送 Image (使用 Commit SHA 作為 Tag)
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./apps/producer
        file: ./apps/producer/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/kafka-producer:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/kafka-producer:${{ github.sha }}
